<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="120" y1="24" x2="1490" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFCF6"/>
      <stop offset="0.48" stop-color="#F7F4EC"/>
      <stop offset="1" stop-color="#FFF1E8"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 800 260" to="8 800 260" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="inkFade" x1="84" y1="138" x2="782" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#C5522F"/>
      <animate attributeName="x2" values="782;900;782" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="ember" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1200 205) rotate(90) scale(220)">
      <stop stop-color="#C5522F" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#F2B18A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1250 286) rotate(90) scale(230)">
      <stop stop-color="#8AB6D9" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="0" y="0" width="1600" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="26" flood-color="#14171C" flood-opacity="0.13"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#14171C" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="clip">
      <rect x="28" y="24" width="1544" height="472" rx="36"/>
    </clipPath>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="28" y="24" width="1544" height="472" rx="36" fill="url(#paper)"/>
  </g>

  <g clip-path="url(#clip)">
    <rect x="28" y="24" width="1544" height="472" fill="url(#grid)" opacity="0.75">
      <animateTransform attributeName="transform" type="translate" values="0 0;-42 -21;0 0" dur="18s" repeatCount="indefinite"/>
    </rect>

    <circle cx="1195" cy="194" r="210" fill="url(#ember)">
      <animate attributeName="cx" values="1160;1240;1160" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="185;230;185" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="300" r="235" fill="url(#blue)">
      <animate attributeName="cx" values="1320;1250;1320" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="300;250;300" dur="12s" repeatCount="indefinite"/>
    </circle>

    <g opacity="0.09" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#14171C">
      <text x="332" y="302" font-size="240">刘洲</text>
      <animate attributeName="opacity" values="0.05;0.12;0.05" dur="7s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(1018 88)">
      <g>
        <ellipse cx="210" cy="165" rx="265" ry="86" fill="none" stroke="#14171C" stroke-opacity="0.12" stroke-width="1.4"/>
        <ellipse cx="210" cy="165" rx="210" ry="62" fill="none" stroke="#C5522F" stroke-opacity="0.22" stroke-width="1.4"/>
        <animateTransform attributeName="transform" type="rotate" from="0 210 165" to="360 210 165" dur="22s" repeatCount="indefinite"/>
      </g>
      <g>
        <ellipse cx="210" cy="165" rx="268" ry="88" fill="none" stroke="#8AB6D9" stroke-opacity="0.18" stroke-width="1.2"/>
        <animateTransform attributeName="transform" type="rotate" from="360 210 165" to="0 210 165" dur="28s" repeatCount="indefinite"/>
      </g>

      <rect x="72" y="92" width="278" height="156" rx="32" fill="#FFFFFF" fill-opacity="0.78" stroke="#14171C" stroke-opacity="0.1"/>
      <rect x="102" y="126" width="128" height="14" rx="7" fill="#14171C" fill-opacity="0.12">
        <animate attributeName="width" values="128;196;128" dur="4.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="102" y="160" width="210" height="12" rx="6" fill="#C5522F" fill-opacity="0.16">
        <animate attributeName="width" values="210;150;210" dur="5.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="102" y="192" width="172" height="12" rx="6" fill="#8AB6D9" fill-opacity="0.22">
        <animate attributeName="width" values="172;226;172" dur="5.8s" repeatCount="indefinite"/>
      </rect>

      <circle cx="405" cy="72" r="17" fill="#C5522F" fill-opacity="0.8">
        <animate attributeName="r" values="12;20;12" dur="3.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;1;0.55" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="42" cy="256" r="10" fill="#8AB6D9" fill-opacity="0.72">
        <animate attributeName="cy" values="256;232;256" dur="4.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <rect x="84" y="78" width="192" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.86" stroke="#14171C" stroke-opacity="0.1"/>
  <text x="180" y="101" text-anchor="middle" fill="#6B645E" font-size="14" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">ACADEMIC SYSTEMS</text>

  <text x="84" y="196" fill="url(#inkFade)" font-size="78" font-weight="750" font-family="Georgia, 'Times New Roman', serif">Zhou Liu</text>
  <text x="84" y="255" fill="#14171C" font-size="31" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Research agents · Multimodal systems · Post-training</text>
  <text x="84" y="300" fill="#68645D" font-size="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Peking University / ByteDance Volcano Engine / Beijing</text>

  <g transform="translate(84 354)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="650">
    <rect x="0" y="0" width="194" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.84" stroke="#14171C" stroke-opacity="0.1"/>
    <text x="97" y="28" text-anchor="middle" fill="#14171C">LLM Agents</text>
    <rect x="210" y="0" width="226" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.84" stroke="#14171C" stroke-opacity="0.1"/>
    <text x="323" y="28" text-anchor="middle" fill="#14171C">Post-training</text>
    <rect x="452" y="0" width="292" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.84" stroke="#14171C" stroke-opacity="0.1"/>
    <text x="598" y="28" text-anchor="middle" fill="#14171C">Scientific Intelligence</text>
  </g>

  <path d="M84 444 C260 414, 418 476, 618 440 S1010 398, 1326 436" stroke="#C5522F" stroke-opacity="0.48" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 16">
    <animate attributeName="stroke-dashoffset" values="0;-130" dur="5s" repeatCount="indefinite"/>
  </path>
  <text x="84" y="472" fill="#7B746C" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">animated profile README · light academic interface · research with teeth</text>
</svg>
